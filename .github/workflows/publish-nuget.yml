name: Publish to NuGet

# Publishes the TwsApi package when a GitHub Release is published.
# The package version is taken from the release tag (a leading "v" is stripped,
# so tag v1.2.0 -> package 1.2.0).
#
# Auth uses NuGet trusted publishing (OIDC) - no long-lived API key secret.
# Prerequisite: create a trusted publishing policy on nuget.org (Account ->
# Trusted Publishing) for owner "UtopleMan", repo "tws-api-dotnet", workflow
# "publish-nuget.yml".

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write   # required for NuGet trusted publishing (OIDC token exchange)

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with the vendored IBKR submodule)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          # InteractiveBrokers/tws-api is private; supply a PAT with pull access via the
          # SUBMODULE_PAT secret. Falls back to the default token when unset.
          token: ${{ secrets.SUBMODULE_PAT || github.token }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Authenticate to NuGet (trusted publishing)
        id: login
        uses: NuGet/login@v1
        with:
          user: UtopleMan   # your nuget.org account username (owns the trusted-publishing policy)

      - name: Derive version from release tag
        id: version
        run: |
          TAG="${{ github.event.release.tag_name }}"
          echo "value=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Pack
        run: >
          dotnet pack src/TwsApi/TwsApi.csproj
          --configuration Release
          -p:Version=${{ steps.version.outputs.value }}
          --output artifacts

      - name: Push to NuGet
        run: >
          dotnet nuget push "artifacts/*.nupkg"
          --api-key ${{ steps.login.outputs.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate
