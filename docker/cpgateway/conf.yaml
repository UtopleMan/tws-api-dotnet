# IBKR Client Portal Gateway configuration.
# Overrides gateway/root/conf.yaml in the distribution (COPYed in the Dockerfile).
ip2loc: "US"

# Proxy target for the IBKR backend — leave as the production Web API host.
proxyRemoteSsl: true
proxyRemoteHost: "https://api.ibkr.com"

# Local listener. HTTPS with the distribution's bundled self-signed cert (vertx.jks).
listenPort: 5000
listenSsl: true

ccp: false
svcEnvironment: "v1"

# Bundled self-signed keystore. Swap for your own cert via the commented keytool
# steps in ../../ (see the reference Dockerfile) if you want a trusted chain.
sslCert: "vertx.jks"
sslPwd: "mywebapi"

authDelay: 3000
portalBaseURL: ""

serverOptions:
    blockedThreadCheckInterval: 1000000
    eventLoopPoolSize: 20
    workerPoolSize: 20
    maxWorkerExecuteTime: 100
    internalBlockingPoolSize: 20

cors:
    origin.allowed: "*"
    allowCredentials: false

# Client IP allow-list. Requests reaching the container through Docker's published
# port appear to come from the bridge gateway (172.x), so that range must be allowed;
# 127.0.0.1 covers in-container access. Tailnet peers arrive with a 100.64.0.0/10
# (CGNAT) source address, so 100.* must be allowed for access over Tailscale.
ips:
  allow:
    - 127.0.0.1
    - 172.*
    - 192.168.*
    - 10.*
    - 100.*
